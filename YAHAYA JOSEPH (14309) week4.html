<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form>
    </div><br>
    <fieldset>
        <legend>Student Orientation Registration Form</legend>
        <h2>Student Orientation Registration Form</h2>
        <div>
            <label for="name">Full Name:</label>
            <input type="text" id="name" placeholder="name"><br><br>

            <label for="matric number">Matric Number:</label>
            <input type="text" id="matric number" placeholder="matric number"><br><br>
s
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="email"><br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" placeholder="age"><br><br>

            <p>Gender:</p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label><br><br>
    
            <label for="dob">Date of birth:</label><br> 
            <input type="date" id="dob" name="dob"><br><br>

            <label for="faculty">Faculty:</label>
            <select id="faculty" name="faculty">
                <option value="law">Law</option>
                <option value="nas">NAS</option>
                <option value="business">Business</option>
            </select><br><br>

            <label for="documents submitted">Documents Submitted:</label><br>
            <input type="checkbox" id="admission letter" name="documents submitted" value="admission letter">
            <label for="admission letter">Admission Letter</label>
            
            <input type="checkbox" id="transcript" name="documents submitted" value="transcript">
            <label for="transcript">Transcript</label><br><br>

            <label for="passport upload">Uplaod Passport:</label><br>
            <input type="file" id="passport upload" name="passport upload"><br><br>

            <label for="comments">Additional Comments:</label><br>
            <textarea id="comments" name="comments" rows="4" cols="50" placeholder="Enter any additional comments here..."></textarea><br><br>

            <button type="submit" value="Submit">Submit</button><br><br>
            <button type="reset" value="Reset">Reset</button>

        </div>
    </fieldset>
    </form>
</body>
</html>
